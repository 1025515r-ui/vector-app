<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VECTOR — Вхід</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1a0533 0%, #3c1570 50%, #6b21a8 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    background: rgba(255,255,255,0.97);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-size: 36px;
    font-weight: 800;
    color: #6b21a8;
    letter-spacing: 4px;
  }
  .logo p {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
    letter-spacing: 1px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    color: #222;
  }
  input:focus { border-color: #6b21a8; }
  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6b21a8, #9333ea);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
    letter-spacing: 1px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    color: #dc2626;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .role-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 16px;
    text-align: center;
    width: 100%;
  }
  .role-admin { background: #fef3c7; color: #92400e; }
  .role-expert { background: #d1fae5; color: #065f46; }
  .role-director { background: #dbeafe; color: #1e40af; }
  .role-methodologist { background: #ede9fe; color: #5b21b6; }
  .role-parent { background: #fce7f3; color: #9d174d; }
  .welcome {
    text-align: center;
    padding: 20px 0;
    display: none;
  }
  .welcome h2 { color: #6b21a8; font-size: 22px; margin-bottom: 8px; }
  .welcome p { color: #666; font-size: 14px; margin-bottom: 20px; }
  .links { text-align: center; margin-top: 20px; }
  .links a { color: #6b21a8; font-size: 13px; text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  .divider { color: #ccc; margin: 0 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>VECTOR</h1>
    <p>Starting the Rainbows · Протокол навичок</p>
  </div>

  <div id="loginForm">
    <div class="error" id="errorMsg"></div>
    <div class="form-group">
      <label>Електронна пошта</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Увійти</button>
    <div class="links">
      <a href="/">← На головну</a>
      <span class="divider">|</span>
      <a href="/app/">Відкрити додаток</a>
    </div>
  </div>

  <div class="welcome" id="welcomeBlock">
    <h2 id="welcomeName">Вітаємо!</h2>
    <p id="welcomeEmail"></p>
    <div class="role-badge" id="roleBadge"></div>
    <br><br>
    <button class="btn" onclick="goToApp()">Перейти до додатку</button>
    <br><br>
    <button class="btn" style="background: #e5e7eb; color: #444;" onclick="logout()">Вийти</button>
  </div>
</div>

<script>
const API = '/api';

const roleNames = {
  admin: 'Адміністратор системи',
  methodologist: 'Керівник методичного об\'єднання',
  director: 'Директор / Завідувач',
  expert: 'Експерт / Вчитель',
  parent: 'Батьки'
};

const roleClasses = {
  admin: 'role-admin',
  methodologist: 'role-methodologist',
  director: 'role-director',
  expert: 'role-expert',
  parent: 'role-parent'
};

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

async function login() {
  hideError();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return showError('Введіть email і пароль');

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Вхід...';

  try {
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Помилка входу');

    localStorage.setItem('vector_token', data.token);
    localStorage.setItem('vector_user', JSON.stringify(data.user));
    showWelcome(data.user);
  } catch (e) {
    showError(e.message);
    btn.disabled = false;
    btn.textContent = 'Увійти';
  }
}

function showWelcome(user) {
  document.getElementById('loginForm').style.display = 'none';
  const wb = document.getElementById('welcomeBlock');
  wb.style.display = 'block';
  document.getElementById('welcomeName').textContent = 'Вітаємо, ' + user.full_name.split(' ')[0] + '!';
  document.getElementById('welcomeEmail').textContent = user.email;
  const badge = document.getElementById('roleBadge');
  badge.textContent = roleNames[user.role] || user.role;
  badge.className = 'role-badge ' + (roleClasses[user.role] || '');
}

function goToApp() {
  window.location.href = '/app/';
}

function logout() {
  localStorage.removeItem('vector_token');
  localStorage.removeItem('vector_user');
  location.reload();
}

// Перевірити чи вже залогінений
window.onload = () => {
  const user = localStorage.getItem('vector_user');
  if (user) showWelcome(JSON.parse(user));

  // Enter для входу
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
};
</script>
</body>
</html>
